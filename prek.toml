# Generated by pragma — https://github.com/zakstak/pragma
# To regenerate: ~/.pragma/install.sh /home/zack/git/redline

[[repos]]
repo = "local"

[[repos.hooks]]
id = "format"
name = "format"
entry = ".pragma-hooks/format.sh"
language = "script"
files = '\.(go|rs|ts|tsx|js|jsx|html|htm|templ|yml|yaml|sh|md|toml|json|py)$'
exclude = '^\.agents/skills/impeccable/'
stages = ["pre-commit"]

[[repos.hooks]]
id = "lint"
name = "lint"
entry = ".pragma-hooks/lint.sh"
language = "script"
files = '(\.(go|rs|ts|tsx|js|jsx|yml|yaml|sh|toml|py)$)|((^|/)([Dd]ockerfile(\.[^/]+)?|[^/]+\.[Dd]ockerfile)$)'
exclude = '^\.agents/skills/impeccable/'
stages = ["pre-commit"]

[[repos.hooks]]
id = "gitleaks"
name = "gitleaks"
entry = ".pragma-hooks/secrets.sh"
language = "script"
pass_filenames = false
always_run = true
stages = ["pre-commit"]

[[repos.hooks]]
id = "test"
name = "test"
entry = ".pragma-hooks/test.sh"
language = "script"
pass_filenames = false
always_run = true
stages = ["pre-push"]
